spring.application.name=new-project-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webflux.routes[0].id=app-auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://APP-AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/app-auth-service/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=app-cliente-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://APP-CLIENTE-SERVICE
